<nav class="main-nav">
  <ul>
    {% for item in site.navigation %}
      {% if item.url == page.url %}
        {% assign active = 'active' %}
      {% else %}
        {% assign active = '' %}
      {% endif %}
      
      <li>
        <a href="{{ item.url | relative_url }}" class="{{ active }}">
          {% if item.icon %}
            <i class="{{ item.icon }}"></i>
          {% endif %}
          {{ item.title }}
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
