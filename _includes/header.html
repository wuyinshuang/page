<header class="site-header">
  <div class="container">
    <nav class="navbar">
      <div class="navbar-brand">
        <a href="{{ '/' | relative_url }}" class="logo">
          <i class="fas fa-code"></i>
          <span>{{ site.title }}</span>
        </a>
      </div>
      
      <button class="navbar-toggle" aria-label="菜单" aria-expanded="false">
        <span class="hamburger"></span>
      </button>
      
      <div class="navbar-menu">
        <ul class="nav-links">
          <li><a href="{{ '/' | relative_url }}" {% if page.url == "/" %}class="active"{% endif %}>首页</a></li>
          <li><a href="{{ '/about' | relative_url }}" {% if page.url == "/about/" %}class="active"{% endif %}>关于</a></li>
          <li><a href="{{ '/archive' | relative_url }}" {% if page.url contains "/archive/" %}class="active"{% endif %}>归档</a></li>
          <li class="dropdown">
            <a href="javascript:void(0)">分类 <i class="fas fa-chevron-down"></i></a>
            <ul class="dropdown-menu">
              <li><a href="{{ '/categories' | relative_url }}">所有分类</a></li>
              <li><hr></li>
              {% for category in site.categories %}
                <li><a href="{{ '/categories' | relative_url }}#{{ category[0] | slugify }}">{{ category[0] }}</a></li>
              {% endfor %}
            </ul>
          </li>
        </ul>
        
        <div class="navbar-social">
          <a href="https://github.com/{{ site.social_links.github }}" target="_blank" aria-label="GitHub">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://twitter.com/{{ site.social_links.twitter }}" target="_blank" aria-label="Twitter">
            <i class="fab fa-twitter"></i>
          </a>
          <a href="https://linkedin.com/in/{{ site.social_links.linkedin }}" target="_blank" aria-label="LinkedIn">
            <i class="fab fa-linkedin"></i>
          </a>
          <a href="/feed.xml" target="_blank" aria-label="RSS订阅">
            <i class="fas fa-rss"></i>
          </a>
        </div>
        
        <div class="theme-toggle">
          <button class="theme-toggle-btn" aria-label="切换主题">
            <i class="fas fa-moon"></i>
            <i class="fas fa-sun"></i>
          </button>
        </div>
      </div>
    </nav>
  </div>
</header>
