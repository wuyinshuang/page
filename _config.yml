# 站点设置
title: "吴银双的技术博客"
name: "吴银双"
email: "wys199811@163.com"
description: "软件工程师 | 技术分享 | 学习记录"
baseurl: ""  
url: "https://wuyinshuang.github.io"  # 替换为你的域名
github_username: wuyinshuang  # 替换为你的GitHub用户名

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: pretty
timezone: Asia/Shanghai

# 主题设置
theme: minima

# 分页设置
paginate: 5
paginate_path: "/page:num/"

# 社交链接
social_links:
  github: wuyinshuang

# 作者信息
author:
  name: "吴银双"
  bio: "软件工程师，热衷于学习和技术分享"
  location: "南京，中国"
  avatar: "/assets/images/avatar.jpg"

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

# 包含文件
include:
  - _pages

# 默认设置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false  # 文章默认关闭评论
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
    values:
      layout: "default"

# 评论系统（禁用）
comments:
  enabled: false
  provider: ""
  disqus_shortname: ""



